<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 博客管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="app" v-cloak class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">管理员登录</h1>
        
        <form @submit.prevent="handleLogin" class="space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">账号</label>
                <input type="text" v-model="username" required
                       class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">密码</label>
                <input type="password" v-model="password" required
                       class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div v-if="error" class="text-red-500 text-sm">{{ error }}</div>

            <button type="submit" :disabled="loading"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition disabled:bg-blue-400">
                {{ loading ? '登录中...' : '登录' }}
            </button>
        </form>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const loading = ref(false);
                const error = ref('');

                const handleLogin = async () => {
                    loading.value = true;
                    error.value = '';
                    
                    try {
                        const response = await fetch('/blog/admin/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: username.value,
                                password: password.value
                            })
                        });

                        if (response.ok) {
                            // 登录成功，保存认证信息并跳转
                            const auth = btoa(`${username.value}:${password.value}`);
                            localStorage.setItem('blog_admin_auth', auth);
                            window.location.href = '/blog/admin/gui';
                        } else {
                            error.value = '账号或密码错误';
                        }
                    } catch (err) {
                        error.value = '登录请求失败，请稍后重试';
                    } finally {
                        loading.value = false;
                    }
                };

                return { username, password, loading, error, handleLogin };
            }
        }).mount('#app');
    </script>
</body>
</html>
