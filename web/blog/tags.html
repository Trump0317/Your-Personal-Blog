<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部标签 - TechBlog</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="app" v-cloak class="min-h-screen flex flex-col">
        <!-- 导航栏 -->
        <nav class="bg-white shadow-sm sticky top-0 z-10">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center space-x-8">
                        <a href="/blog/visitor/index" class="text-2xl font-bold text-blue-600 tracking-tight">TechBlog</a>
                        <div class="hidden md:flex items-center space-x-6">
                            <a href="/blog/visitor/index" class="text-gray-600 hover:text-blue-600 font-medium">首页</a>
                            <a href="/blog/visitor/categories/page" class="text-gray-600 hover:text-blue-600 font-medium">分类</a>
                            <a href="/blog/visitor/tags/page" class="text-blue-600 font-bold">标签</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow max-w-4xl mx-auto px-4 py-12 w-full text-center">
            <h1 class="text-3xl font-bold mb-12 flex justify-center items-center">
                <span class="w-1.5 h-8 bg-blue-600 mr-3 rounded"></span>
                热门标签
            </h1>
            
            <div v-if="loading" class="flex justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <div v-else class="flex flex-wrap justify-center gap-4">
                <span v-for="tag in tags" :key="tag.id" 
                      @click="goToTag(tag.name)"
                      class="px-6 py-2 bg-white text-gray-700 rounded-full border border-gray-200 hover:border-blue-500 hover:text-blue-600 hover:shadow-sm cursor-pointer transition-all text-lg">
                    # {{ tag.name }}
                </span>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const tags = ref([]);
                const loading = ref(true);

                const fetchTags = async () => {
                    try {
                        const res = await fetch('/blog/visitor/tags');
                        const data = await res.json();
                        tags.value = data.data || data || [];
                    } catch (err) {
                        console.error('Failed to fetch tags:', err);
                    } finally {
                        loading.value = false;
                    }
                };

                const goToTag = (name) => {
                    window.location.href = `/blog/visitor/index?tag_id=${name}`;
                };

                onMounted(fetchTags);
                return { tags, loading, goToTag };
            }
        }).mount('#app');
    </script>
</body>
</html>
