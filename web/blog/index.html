<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人博客</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
        .post-list { text-align: left; margin-top: 30px; }
        .post-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .post-item h3 { margin: 0 0 5px 0; }
        .post-meta { color: #888; font-size: 0.85em; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>My Personal Blog</h1>
    <p>欢迎来到我的文字世界</p>
    <hr>
    <div id="posts-container" class="post-list">
        <p>正在拉取最新内容...</p>
    </div>

    <script>
        async function fetchPosts() {
            try {
                // 这里的路径对应我们后端 API 的地址
                const response = await fetch('/blog/visitor/posts');
                const data = await response.json();
                
                const container = document.getElementById('posts-container');
                if (data.posts && data.posts.length > 0) {
                    container.innerHTML = data.posts.map(post => `
                        <div class="post-item">
                            <h3>${post.title}</h3>
                            <div class="post-meta">发布时间: ${new Date(post.created_at).toLocaleString()}</div>
                            <p>${post.summary || '点击阅读全文...'}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p>主人很懒，还没有写过文章内容。</p>';
                }
            } catch (err) {
                document.getElementById('posts-container').innerHTML = 
                    '<p class="error">糟糕，内容加载失败了: ' + err.message + '</p>';
            }
        }
        fetchPosts();
    </script>
</body>
</html>
