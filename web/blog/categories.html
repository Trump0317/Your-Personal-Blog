<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部分类 - TechBlog</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="app" v-cloak class="min-h-screen flex flex-col">
        <!-- 导航栏 -->
        <nav class="bg-white shadow-sm sticky top-0 z-10">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center space-x-8">
                        <a href="/blog/visitor/index" class="text-2xl font-bold text-blue-600 tracking-tight">TechBlog</a>
                        <div class="hidden md:flex items-center space-x-6">
                            <a href="/blog/visitor/index" class="text-gray-600 hover:text-blue-600 font-medium">首页</a>
                            <a href="/blog/visitor/categories/page" class="text-blue-600 font-bold">分类</a>
                            <a href="/blog/visitor/tags/page" class="text-gray-600 hover:text-blue-600 font-medium">标签</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow max-w-4xl mx-auto px-4 py-12 w-full">
            <h1 class="text-3xl font-bold mb-8 flex items-center">
                <span class="w-1.5 h-8 bg-blue-600 mr-3 rounded"></span>
                文章分类
            </h1>
            
            <div v-if="loading" class="flex justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <div v-else class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div v-for="cat in categories" :key="cat.id" 
                     @click="goToCategory(cat.id)"
                     class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-200 cursor-pointer transition-all group">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold group-hover:text-blue-600">{{ cat.name }}</h3>
                            <p class="text-gray-500 text-sm mt-1">查看该分类下的所有文章</p>
                        </div>
                        <div class="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const categories = ref([]);
                const loading = ref(true);

                const fetchCategories = async () => {
                    try {
                        const res = await fetch('/blog/visitor/categories');
                        if (!res.ok) return;
                        const data = await res.json();
                        categories.value = data.data || data || [];
                    } catch (err) {
                        console.error('Failed to fetch categories:', err);
                    } finally {
                        loading.value = false;
                    }
                };

                const goToCategory = (id) => {
                    window.location.href = `/blog/visitor/index?category_id=${id}`;
                };

                onMounted(fetchCategories);
                return { categories, loading, goToCategory };
            }
        }).mount('#app');
    </script>
</body>
</html>
