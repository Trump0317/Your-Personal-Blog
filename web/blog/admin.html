<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" v-cloak class="flex flex-col h-screen">
        <!-- 导航栏 -->
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">Your Blog Admin</h1>
            <div class="flex items-center space-x-6">
                <nav class="flex space-x-4 mr-4 border-r pr-4">
                    <button @click="showList" :class="view === 'list' ? 'text-blue-600 font-bold' : 'text-gray-600 hover:text-blue-600'">文章</button>
                    <button @click="showCategories" :class="view === 'categories' ? 'text-blue-600 font-bold' : 'text-gray-600 hover:text-blue-600'">分类</button>
                    <button @click="showTags" :class="view === 'tags' ? 'text-blue-600 font-bold' : 'text-gray-600 hover:text-blue-600'">标签</button>
                </nav>
                <button @click="openEditor()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">新文章</button>
                <button @click="handleLogout" class="text-gray-400 hover:text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-auto p-6">
            <!-- 文章列表 -->
            <div v-if="view === 'list'" class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">标题</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">分类</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">状态</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <tr v-for="post in posts" :key="post.id" class="hover:bg-gray-50">
                            <td class="px-6 py-4 font-medium text-gray-900">{{ post.title }}</td>
                            <td class="px-6 py-4 text-sm text-gray-500">{{ post.category?.name || '-' }}</td>
                            <td class="px-6 py-4">
                                <span :class="['px-2 py-1 rounded-full text-xs font-medium', post.status === 1 ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800']">
                                    {{ post.status === 1 ? '已发布' : '草稿' }}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm space-x-3">
                                <button @click="openEditor(post)" class="text-blue-600 hover:underline">编辑</button>
                                <button @click="deletePost(post.id)" class="text-red-500 hover:underline">删除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分类管理 -->
            <div v-if="view === 'categories'" class="max-w-4xl mx-auto space-y-6">
                <div class="bg-white rounded-xl shadow p-6">
                    <h2 class="text-xl font-bold mb-4">添加/编辑分类</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <input type="text" v-model="catForm.name" placeholder="分类名称" class="border rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                        <input type="text" v-model="catForm.slug" placeholder="Slug (URL别名)" class="border rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                        <button @click="saveCategory" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                            {{ catForm.id ? '更新分类' : '添加分类' }}
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">名称</th>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Slug</th>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            <tr v-for="cat in categories" :key="cat.id" class="hover:bg-gray-50">
                                <td class="px-6 py-4">{{ cat.name }}</td>
                                <td class="px-6 py-4 text-gray-500">{{ cat.slug || '-' }}</td>
                                <td class="px-6 py-4 space-x-3">
                                    <button @click="editCategory(cat)" class="text-blue-600 hover:underline">编辑</button>
                                    <button @click="deleteCategory(cat.id)" class="text-red-500 hover:underline">删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 标签管理 -->
            <div v-if="view === 'tags'" class="max-w-4xl mx-auto space-y-6">
                <div class="bg-white rounded-xl shadow p-6">
                    <h2 class="text-xl font-bold mb-4">添加标签</h2>
                    <div class="flex space-x-4">
                        <input type="text" v-model="newTagName" @keyup.enter="addTagFromPage" placeholder="新标签名称" class="flex-1 border rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                        <button @click="addTagFromPage" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">添加</button>
                    </div>
                </div>

                <div class="flex flex-wrap gap-3">
                    <div v-for="tag in tags" :key="tag.id" class="bg-white border rounded-full px-4 py-2 flex items-center space-x-2 shadow-sm hover:shadow-md transition">
                        <span class="text-gray-700"># {{ tag.name }}</span>
                        <button @click="deleteTag(tag.id)" class="text-gray-400 hover:text-red-500 text-lg">&times;</button>
                    </div>
                </div>
            </div>

            <!-- 编辑器 -->
            <div v-if="view === 'edit'" class="bg-white rounded-xl shadow p-8 max-w-4xl mx-auto space-y-6">
                <div class="flex justify-between items-baseline mb-4">
                    <h2 class="text-2xl font-bold">{{ form.id ? '编辑文章' : '创作新文章' }}</h2>
                    <button @click="view = 'list'" class="text-gray-400 hover:text-gray-600 text-sm">取消返回</button>
                </div>
                
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">标题</label>
                    <input type="text" v-model="form.title" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="文章标题...">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700">Slug (URL 路径)</label>
                        <input type="text" v-model="form.slug" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="e.g. my-first-post">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700">分类</label>
                        <select v-model="form.category_id" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
                            <option value="">请选择分类</option>
                            <option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.name }}</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">标签</label>
                    <div class="flex flex-wrap gap-2 mb-2">
                        <label v-for="tag in tags" :key="tag.id" class="flex items-center px-3 py-1 bg-gray-100 rounded-full cursor-pointer hover:bg-gray-200 transition">
                            <input type="checkbox" :value="tag.id" v-model="selectedTagIds" class="mr-2">
                            <span class="text-sm text-gray-700">{{ tag.name }}</span>
                        </label>
                    </div>
                    <div class="flex space-x-2">
                        <input type="text" v-model="newTagName" @keyup.enter="addTag" class="flex-1 border rounded-lg px-3 py-1 text-sm focus:ring-2 focus:ring-blue-400 outline-none" placeholder="输入新标签名...">
                        <button @click="addTag" class="px-3 py-1 bg-gray-600 text-white text-sm rounded-md hover:bg-gray-700">添加标签</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">正文 (Markdown)</label>
                    <textarea v-model="form.content" rows="12" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none font-mono" placeholder="写入正文..."></textarea>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">摘要 (可选)</label>
                    <textarea v-model="form.summary" rows="3" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="如果不填写，系统将自动从正文中生成摘要..."></textarea>
                </div>

                <div class="flex justify-end space-x-4 pt-4 border-t">
                    <button @click="savePost('draft')" class="px-6 py-2 border rounded-lg hover:bg-gray-50">{{ form.id ? '存为草稿' : '保存草稿' }}</button>
                    <button @click="savePost('published')" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">{{ form.id ? '发布更新' : '直接发布' }}</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const view = ref('list');
                const posts = ref([]);
                const categories = ref([]);
                const tags = ref([]);
                const selectedTagIds = ref([]);
                const newTagName = ref('');
                const form = ref({ id: null, title: '', slug: '', content: '', summary: '', category_id: '', status: 'draft' });
                const catForm = ref({ id: null, name: '', slug: '' });

                const getAuth = () => localStorage.getItem('blog_admin_auth');

                const secureFetch = async (url, options = {}) => {
                    const auth = getAuth();
                    if (!auth) {
                        window.location.href = '/blog/admin/login';
                        return;
                    }
                    
                    options.headers = {
                        ...options.headers,
                        'Authorization': `Basic ${auth}`
                    };

                    const res = await fetch(url, options);
                    if (res.status === 401) {
                        localStorage.removeItem('blog_admin_auth');
                        window.location.href = '/blog/admin/login';
                    }
                    return res;
                };

                const fetchPosts = async () => {
                    const res = await secureFetch('/blog/admin/posts?page=1&page_size=100');
                    if (!res || !res.ok) return;
                    const data = await res.json();
                    // 处理后端统一 Response 包装中的 Data.items
                    posts.value = data.data?.items || data.posts || [];
                };

                const fetchMeta = async () => {
                    const [catRes, tagRes] = await Promise.all([
                        secureFetch('/blog/admin/categories'),
                        secureFetch('/blog/admin/tags')
                    ]);
                    if (catRes && catRes.ok) {
                        const data = await catRes.json();
                        categories.value = data.data || data; // 处理 Response 包装
                    }
                    if (tagRes && tagRes.ok) {
                        const data = await tagRes.json();
                        tags.value = data.data || data;
                    }
                };

                const addTag = async () => {
                    if (!newTagName.value.trim()) return;
                    const res = await secureFetch('/blog/admin/tags', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: newTagName.value.trim() })
                    });
                    if (res && res.ok) {
                        const data = await res.json();
                        const newTag = data.data || data;
                        tags.value.push(newTag);
                        selectedTagIds.value.push(newTag.id);
                        newTagName.value = '';
                    } else {
                        alert('添加标签失败');
                    }
                };

                const showList = () => { view.value = 'list'; fetchPosts(); };

                const openEditor = async (post = null) => {
                    if (post) {
                        // 初始填充（防止闪烁）
                        form.value = { ...post, category_id: post.category?.id || '' };
                        selectedTagIds.value = (post.tags || []).map(t => t.id);
                        
                        // 异步获取完整详情（包括正文内容）
                        try {
                            const res = await secureFetch(`/blog/admin/posts/${post.id}`);
                            if (res && res.ok) {
                                const data = await res.json();
                                const detail = data.data || data;
                                form.value.content = detail.content || '';
                                form.value.summary = detail.summary || '';
                                // 同步更新标签和分类，以防列表数据不全
                                if (detail.category) form.value.category_id = detail.category.id;
                                if (detail.tags) selectedTagIds.value = detail.tags.map(t => t.id);
                            }
                        } catch (e) {
                            console.error('获取文章详情失败:', e);
                        }
                    } else {
                        form.value = { id: null, title: '', slug: '', content: '', category_id: '', status: 'draft' };
                        selectedTagIds.value = [];
                    }
                    newTagName.value = '';
                    view.value = 'edit';
                };

                const savePost = async (status) => {
                    const isEdit = !!form.value.id;
                    const method = isEdit ? 'PUT' : 'POST';
                    const url = isEdit ? `/blog/admin/posts/${form.value.id}` : '/blog/admin/posts';
                    
                    const payload = {
                        title: form.value.title,
                        slug: form.value.slug,
                        content: form.value.content,
                        summary: form.value.summary || '',
                        category_id: form.value.category_id,
                        status: status,
                        tag_ids: selectedTagIds.value
                    };

                    const res = await secureFetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res && res.ok) {
                        alert('操作成功');
                        showList();
                    } else if (res) {
                        alert('保存失败: ' + (await res.text()));
                    }
                };

                const deletePost = async (id) => {
                    if (!confirm('确定删除此文章吗？')) return;
                    await secureFetch(`/blog/admin/posts/${id}`, { method: 'DELETE' });
                    fetchPosts();
                };

                const handleLogout = () => {
                    localStorage.removeItem('blog_admin_auth');
                    window.location.href = '/blog/admin/login';
                };

                // 分类管理逻辑
                const showCategories = () => { view.value = 'categories'; fetchMeta(); };
                const editCategory = (cat) => { catForm.value = { ...cat }; };
                const saveCategory = async () => {
                    if (!catForm.value.name) return alert('名称不能为空');
                    const isEdit = !!catForm.value.id;
                    const url = isEdit ? `/blog/admin/categories/${catForm.value.id}` : '/blog/admin/categories';
                    const method = isEdit ? 'PUT' : 'POST';
                    
                    const res = await secureFetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(catForm.value)
                    });
                    if (res && res.ok) {
                        catForm.value = { id: null, name: '', slug: '' };
                        fetchMeta();
                    } else {
                        alert('保存失败');
                    }
                };
                const deleteCategory = async (id) => {
                    if (!confirm('确定删除此分类吗？这可能导致相关文章分类失效。')) return;
                    const res = await secureFetch(`/blog/admin/categories/${id}`, { method: 'DELETE' });
                    if (res && res.ok) fetchMeta();
                };

                // 标签管理逻辑
                const showTags = () => { view.value = 'tags'; fetchMeta(); };
                const addTagFromPage = async () => {
                    if (!newTagName.value.trim()) return;
                    const res = await secureFetch('/blog/admin/tags', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: newTagName.value.trim() })
                    });
                    if (res && res.ok) {
                        newTagName.value = '';
                        fetchMeta();
                    }
                };
                const deleteTag = async (id) => {
                    if (!confirm('确定删除此标签吗？')) return;
                    const res = await secureFetch(`/blog/admin/tags/${id}`, { method: 'DELETE' });
                    if (res && res.ok) fetchMeta();
                };

                onMounted(() => { fetchPosts(); fetchMeta(); });

                return { 
                    view, posts, categories, tags, selectedTagIds, newTagName, form, catForm,
                    showList, openEditor, savePost, deletePost, handleLogout, addTag, 
                    showCategories, editCategory, saveCategory, deleteCategory,
                    showTags, addTagFromPage, deleteTag
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
